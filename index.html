<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DAVBOT AI</title>


<style>

*{
box-sizing:border-box;
font-family:Arial,sans-serif;
}


body{

margin:0;
background:#050816;
color:white;
height:100vh;
display:flex;
justify-content:center;

}



.chat{

width:100%;
max-width:650px;
height:100vh;
display:flex;
flex-direction:column;

}




.header{

background:#111827;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
color:#00d9ff;

}





#messages{

flex:1;
overflow-y:auto;
padding:15px;

}





.msg{

padding:12px;
margin:12px 0;
border-radius:15px;
max-width:85%;

}



.user{

background:#00d9ff;
color:black;
margin-left:auto;

}




.ai{

background:#1f2937;

}




.content{

white-space:pre-wrap;

}





.actions{

display:flex;
gap:7px;
margin-top:10px;

}




.actions button{

width:35px;
height:35px;
font-size:14px;
background:#374151;
color:white;

}




.actions button:hover{

background:#00d9ff;
color:black;

}





.msg img{

max-width:250px;
border-radius:15px;

}





.download{

display:inline-block;
margin-top:8px;
padding:8px;
background:#00d9ff;
color:black;
border-radius:10px;
text-decoration:none;

}





.input{

display:flex;
align-items:center;
gap:8px;
padding:15px;
background:#111827;

}




input[type="text"]{

flex:1;
padding:14px;
border:none;
outline:none;
border-radius:20px;
background:#1f2937;
color:white;

}





button{

border:none;
border-radius:50%;
width:45px;
height:45px;
background:#00d9ff;
cursor:pointer;
font-size:18px;

}


</style>


</head>



<body>



<div class="chat">



<div class="header">

🤖 DAVBOT AI

</div>





<div id="messages">



<div class="msg ai">


<div class="content">

Bonjour 👋

Je suis <b>DAVBOT AI</b>.

Créé par <b>Ir David Mpongo 🇨🇩</b>.

Comment puis-je vous aider ?

</div>



<div class="actions">

<button onclick="speakMessage(this)">
🔊
</button>

<button onclick="copyMessage(this)">
📋
</button>

<button onclick="deleteMessage(this)">
🗑️
</button>

</div>


</div>




</div>







<div class="input">



<input 
type="file"
id="imageInput"
accept="image/*"
hidden
>



<button id="imageBtn">

📷

</button>





<input 
type="text"
id="input"
placeholder="Écrire un message..."
>





<button id="audioBtn">

🎤

</button>





<button id="send">

➤

</button>



</div>




</div>






<script type="module" src="app.js"></script>


</body>

</html>
