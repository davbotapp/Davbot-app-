<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Davbot Chat - Bienvenue</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    /* Reset de base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #4b6cb7, #182848);
      overflow: hidden;
    }

    /* Animation des étoiles ou bulles en arrière-plan */
    .background-animation {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }

    .bubble {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      animation: rise 8s infinite ease-in;
    }

    @keyframes rise {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      50% { opacity: 0.5; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* Conteneur principal */
    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      color: #fff;
      animation: fadeIn 2s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: 3rem;
      font-weight: 800;
      margin-bottom: 20px;
      animation: titleAnim 2s ease forwards;
    }

    @keyframes titleAnim {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    p {
      font-size: 1.2rem;
      margin-bottom: 40px;
      color: #ddd;
      animation: fadeUp 2.5s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Bouton Commencer */
    .btn-start {
      padding: 15px 40px;
      font-size: 1.2rem;
      font-weight: 600;
      color: #fff;
      background: #ff4b2b;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      animation: fadeUp 3s ease forwards;
    }

    .btn-start:hover {
      transform: scale(1.1);
      background: #ff416c;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <div class="background-animation" id="bubbles"></div>

  <div class="container">
    <h1>Bienvenue sur Davbot Chat</h1>
    <p>L’application de chatbot intelligente pour vos conversations.</p>
    <button class="btn-start" onclick="openChatGPT()">Commencer</button>
  </div>

  <script>
    // Génération de bulles aléatoires pour l'arrière-plan
    const bubbleContainer = document.getElementById('bubbles');
    for(let i = 0; i < 30; i++) {
      let bubble = document.createElement('div');
      bubble.classList.add('bubble');
      let size = Math.random() * 20 + 10; // taille aléatoire
      bubble.style.width = size + 'px';
      bubble.style.height = size + 'px';
      bubble.style.left = Math.random() * 100 + 'vw';
      bubble.style.animationDuration = (Math.random() * 5 + 5) + 's';
      bubble.style.opacity = Math.random();
      bubbleContainer.appendChild(bubble);
    }

    // Fonction du bouton
    function openChatGPT() {
      window.open('https://chatgpt.com/', '_blank');
    }
  </script>
</body>
</html>
