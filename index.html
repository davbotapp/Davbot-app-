<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DavBot App</title>
<link rel="icon" href="icon.png">
<style>
body{
  margin:0;
  font-family:system-ui,Arial;
  background:#020617;
  color:#e5e7eb;
  display:flex;
  flex-direction:column;
  height:100vh;
}

header{
  padding:14px;
  text-align:center;
  background:#0c0c1a;
  border-bottom:1px solid #1f2937;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  text-shadow: 0 0 5px #8b5cf6, 0 0 10px #8b5cf6, 0 0 20px #8b5cf6, 0 0 40px #8b5cf6;
}

header img{
  width:40px;
  height:40px;
  border-radius:50%;
  object-fit:cover;
}

.subtitle{font-size:12px;color:#9ca3af;}

#chat{
  flex:1;
  overflow-y:auto;
  padding:20px;
}

.message{
  max-width:800px;
  margin:auto;
  margin-bottom:18px;
  line-height:1.6;
  position:relative;
  padding:10px 14px;
  border-radius:15px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(5px);
  color:#fff;
  text-shadow:0 0 3px #8b5cf6;
  box-shadow: 0 0 10px #8b5cf6, 0 0 20px #8b5cf6, 0 0 40px #8b5cf6;
}

.user::before{content:"Pro : "; font-weight:bold; color:#facc15;}
.bot::before{content:"Réponse DavBot : "; font-weight:bold; color:#34d399;}

.timestamp{
  font-size:10px;
  color:#9ca3af;
  margin-top:4px;
}

.actions{
  margin-top:6px;
  display:flex;
  gap:8px;
}

.actions button{
  font-size:11px;
  background:#1f2937;
  color:#fff;
  border:none;
  padding:4px 6px;
  border-radius:6px;
  cursor:pointer;
  text-shadow:0 0 3px #8b5cf6;
}

.input-area{
  display:flex;
  padding:10px;
  background:#020617;
  border-top:1px solid #1f2937;
  gap:6px;
  align-items:center;
}

input{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:1px solid #1f2937;
  background:#020617;
  color:#fff;
  text-shadow:0 0 2px #8b5cf6;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  background:#8b5cf6;
  color:#fff;
  font-weight:600;
  text-shadow:0 0 3px #fff;
}

#humeurBtn{
  background:#111;
  padding:6px 10px;
  border-radius:50px;
  font-size:12px;
  border:1px solid #8b5cf6;
  cursor:pointer;
  text-shadow:0 0 2px #8b5cf6;
}
#humeurMenu{
  position:absolute;
  background:#020617;
  border:1px solid #8b5cf6;
  padding:6px;
  border-radius:8px;
  display:none;
  flex-direction:column;
  gap:4px;
}
#humeurMenu button{
  background:transparent;
  border:none;
  color:#fff;
  cursor:pointer;
  text-align:left;
  font-size:12px;
  text-shadow:0 0 2px #8b5cf6;
}
</style>
</head>
<body>

<header>
  <img src="https://i.ibb.co/M5sJH30L/mysterious-hacker-figure-sitting-dark-260nw-2675788995.webp" alt="DavBot">
  <div>
    🤖 DAVBOT<br>
    <span class="subtitle">Créé par David Mpongo - Informatique & Développement Web</span>
  </div>
</header>

<div style="position:relative; padding:10px;">
  <button id="humeurBtn">⚙️ Mode : Poli</button>
  <div id="humeurMenu">
    <button data-mode="poli">Poli</button>
    <button data-mode="méchant">Méchant</button>
    <button data-mode="cruel">Cruel</button>
    <button data-mode="logique">Logique</button>
    <button data-mode="bref">Bref</button>
    <button data-mode="démoniaque">Démoniaque</button>
    <button data-mode="religieux">Religieux</button>
  </div>
</div>

<div id="chat"></div>

<div class="input-area">
  <input id="input" placeholder="Écris un message…">
  <button onclick="sendMessage()">Envoyer</button>
  <button onclick="startVoice()">🎤</button>
</div>

<script>
// --- Paramètres ---
const API_URL="https://arychauhann.onrender.com/api/gemini-proxy2";
let history=JSON.parse(localStorage.getItem("davbot_history")||"[]");
const chat=document.getElementById("chat");
const input=document.getElementById("input");

let mode = "poli"; // mode par défaut

// --- Humeur menu ---
const humeurBtn = document.getElementById("humeurBtn");
const humeurMenu = document.getElementById("humeurMenu");

humeurBtn.addEventListener("click", ()=>{ humeurMenu.style.display = humeurMenu.style.display==="flex"?"none":"flex"; });
humeurMenu.querySelectorAll("button").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    mode = btn.dataset.mode;
    humeurBtn.textContent = `⚙️ Mode : ${mode.charAt(0).toUpperCase()+mode.slice(1)}`;
    humeurMenu.style.display="none";
  });
});

// --- Prompt ---
function buildPrompt(userText){
  const now = new Date();
  const dateTime = `${now.getDate().toString().padStart(2,'0')}/${
    (now.getMonth()+1).toString().padStart(2,'0')}/${now.getFullYear()} ${
    now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
  return `
Tu es DAVBOT, IA créée par David Mpongo (informatique & dev web).  
Réponds selon le mode : ${mode}. Style rapide, clair, précis, pro, pas de blabla inutile.  
Date et heure actuelles : ${dateTime}  
Utilisateur : ${userText}  
Assistant :`;
}

// --- Historique ---
function saveHistory(){ localStorage.setItem("davbot_history",JSON.stringify(history)); }
function render(){
  chat.innerHTML="";
  history.forEach((m,i)=> createMessage(m.text,m.type,i,false,m.time));
  chat.scrollTop=chat.scrollHeight;
}

// --- Messages ---
function createMessage(text,type,index,save=true,time){
  const div=document.createElement("div");
  div.className="message "+type;
  div.innerHTML=`<div class="content"></div>
  <div class="timestamp">${time||getTime()}</div>
  <div class="actions">
    <button onclick="copyMsg(${index})">Copier</button>
    <button onclick="deleteMsg(${index})">Supprimer</button>
  </div>`;
  chat.appendChild(div);

  if(save){ history.push({text,type,time:getTime()}); saveHistory(); }

  typeWriter(div.querySelector(".content"),text);
  chat.scrollTop=chat.scrollHeight;
}

// --- Effet écriture ---
function typeWriter(el,text){
  let i=0;
  const speed=15;
  function typing(){ if(i<text.length){ el.innerHTML+=text.charAt(i); i++; setTimeout(typing,speed); } }
  typing();
}

// --- Horodatage ---
function getTime(){ const d=new Date(); return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'); }

// --- Envoi message ---
async function sendMessage(){
  const text=input.value.trim();
  if(!text) return;
  input.value="";
  createMessage(text,"user",history.length,getTime());

  try{
    const prompt = encodeURIComponent(buildPrompt(text));
    const res = await fetch(`${API_URL}?prompt=${prompt}`);
    const data = await res.json();
    const reply = data.result||data.reply||data.response||"Erreur";
    createMessage(reply,"bot",history.length,true,getTime());
  }catch{
    createMessage("⚠️ Hors ligne ou serveur indisponible","bot",history.length,true,getTime());
  }
}

// --- Supprimer / Copier ---
function deleteMsg(i){ history.splice(i,1); saveHistory(); render(); }
function copyMsg(i){ navigator.clipboard.writeText(history[i].text); alert("Message copié"); }

// --- Dictée vocale ---
function startVoice(){
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SpeechRecognition){ alert("Vocal non supporté"); return;}
  const recog = new SpeechRecognition();
  recog.lang="fr-FR";
  recog.start();
  recog.onresult = e => { input.value = e.results[0][0].transcript; };
}

// --- Entrée clavier ---
input.addEventListener("keydown",e=>{ if(e.key==="Enter") sendMessage(); });

// --- Init ---
render();
</script>
</body>
</html>
