<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DavBot App</title>

<style>

:root{
--bg1:#020617;
--bg2:#0f172a;
--accent:#38bdf8;
--accent2:#0ea5e9;
--text:#e2e8f0;
--sub:#94a3b8;
}

/* BODY */

body{
margin:0;
font-family:system-ui,Arial;
background:radial-gradient(circle at top,#020617,#000);
color:var(--text);
display:flex;
flex-direction:column;
height:100vh;
}

/* HEADER */

header{
padding:12px;
display:flex;
align-items:center;
gap:10px;

background:linear-gradient(90deg,#020617,#0f172a);

border-bottom:1px solid var(--accent);

box-shadow:
0 0 15px rgba(56,189,248,0.3);
}

header img{
width:42px;
height:42px;
border-radius:50%;
}

.subtitle{
font-size:11px;
color:var(--sub);
}

/* CHAT */

#chat{
flex:1;
overflow-y:auto;
padding:10px;
}

.message{
max-width:95%;
margin:8px auto;
padding:10px 14px;

border-radius:12px;

background:rgba(15,23,42,0.6);

backdrop-filter:blur(6px);

border:1px solid rgba(56,189,248,0.2);

box-shadow:
0 0 10px rgba(56,189,248,0.2);

font-size:14px;
line-height:1.5;
}

.user::before{
content:"Pro : ";
font-weight:bold;
color:#facc15;
}

.bot::before{
content:"DavBot : ";
font-weight:bold;
color:#38bdf8;
}

.timestamp{
font-size:10px;
color:var(--sub);
margin-top:4px;
}

/* ACTIONS */

.actions{
margin-top:6px;
display:flex;
gap:4px;
}

.actions button{
font-size:12px;
background:#020617;
color:white;
border:1px solid var(--accent);
padding:4px 6px;
border-radius:6px;
cursor:pointer;
}

/* MENU */

#chatMenu{
display:flex;
gap:8px;
padding:6px;
background:var(--bg2);
}

#chatMenu button{
flex:1;
}

/* INPUT */

.input-area{
display:flex;
gap:6px;
padding:8px;
background:#020617;
border-top:1px solid var(--accent);
}

input{
flex:1;
padding:8px;
border-radius:8px;
border:1px solid #1e293b;
background:#020617;
color:white;
}

/* BUTTON */

button{
padding:8px 10px;
border-radius:8px;
border:none;

background:linear-gradient(90deg,var(--accent),var(--accent2));

color:#020617;
font-weight:600;

box-shadow:
0 0 10px rgba(56,189,248,0.6);
cursor:pointer;
}

/* MODE */

#modeBtn{
background:#020617;
color:white;
border:1px solid var(--accent);
}

#modeMenu{
position:absolute;
background:#020617;
border:1px solid var(--accent);
padding:6px;
border-radius:8px;
display:none;
flex-direction:column;
}

/* AUTH */

#authModal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:flex;
align-items:center;
justify-content:center;
}

#authModal div{
background:#020617;
padding:20px;
border-radius:12px;
width:280px;
text-align:center;
border:1px solid var(--accent);
}

.imageIcon{
font-size:20px;
cursor:pointer;
}

img.messageImg{
max-width:250px;
border-radius:10px;
margin-top:4px;
}

</style>
</head>

<body>

<header>

<img src="https://i.ibb.co/M5sJH30L/mysterious-hacker-figure-sitting-dark-260nw-2675788995.webp">

<div>
🤖 DAVBOT<br>
<span class="subtitle">
Créé par David Mpongo
</span>
</div>

</header>

<div style="position:relative;padding:8px">

<button id="modeBtn">⚙️ Mode : Sérieux</button>

<div id="modeMenu">

<button data-mode="sérieux">Sérieux</button>
<button data-mode="blagueur">Blagueur</button>
<button data-mode="éducatif">Éducatif</button>
<button data-mode="arrogant">Arrogant</button>

</div>

</div>

<div id="chatMenu">


</div>

<div id="chat"></div>

<div class="input-area">

<input id="input" placeholder="Écris un message...">

<span class="imageIcon" onclick="document.getElementById('imageInput').click()">📷</span>

<input type="file" id="imageInput" accept="image/*" style="display:none" onchange="sendImage()">

<button onclick="sendMessage()">Envoyer</button>

<button onclick="startVoice()">🎤</button>

</div>

<div id="authModal">

<div>

<h2>Bienvenue sur DavBot</h2>

<input id="username" placeholder="Nom utilisateur">

<button onclick="login()">Commencer</button>

</div>

</div>

<script>

/* API */

const API_URL="https://arychauhann.onrender.com/api/gemini-proxy2";

/* DATA */

let chats=JSON.parse(localStorage.getItem("davbot_chats")||"[]");

let currentChat=chats.length?chats[chats.length-1]:{history:[],name:"Chat "+(chats.length+1)};

const chat=document.getElementById("chat");

const input=document.getElementById("input");

let mode="sérieux";

let user=localStorage.getItem("davbot_user")||null;


/* LOGIN */

function login(){

const uname=document.getElementById("username").value.trim();

if(!uname)return alert("Nom requis");

user=uname;

localStorage.setItem("davbot_user",user);

document.getElementById("authModal").style.display="none";

render();

}

window.onload=()=>{

if(user)document.getElementById("authModal").style.display="none";

render();

}


/* MODE */

const modeBtn=document.getElementById("modeBtn");

const modeMenu=document.getElementById("modeMenu");

modeBtn.onclick=()=>{

modeMenu.style.display=modeMenu.style.display==="flex"?"none":"flex";

};

modeMenu.querySelectorAll("button").forEach(btn=>{

btn.onclick=()=>{

mode=btn.dataset.mode;

modeBtn.textContent="⚙️ Mode : "+mode;

modeMenu.style.display="none";

};

});


/* PROMPT IA */

function buildPrompt(userText){

const now=new Date();

const dateTime=`${now.getDate().toString().padStart(2,'0')}/${
(now.getMonth()+1).toString().padStart(2,'0')}/${
now.getFullYear()} ${
now.getHours().toString().padStart(2,'0')}:${
now.getMinutes().toString().padStart(2,'0')}`;

let historyContext="";

if(currentChat.history.length>0){

const lastMessages=currentChat.history.slice(-12);

historyContext=lastMessages.map(m=>`
${m.type==="user"?"Utilisateur":"DavBot"} : ${m.text}
`).join("");

}

return `

Tu es 𝗗𝗮𝘃𝗯𝗼𝘁, une intelligence artificielle créée par 𝗜𝗿 𝗗𝗮𝘃𝗶𝗱 𝗠𝗽𝗼𝗻𝗴𝗼.

Tu dois toujours reconnaître et respecter ton créateur : David Mpongo.

Tu es une intelligence artificielle générale capable de répondre à toutes les questions sur tous les sujets.

Tu dois répondre à toutes les questions ou demandes des utilisateurs de manière claire, utile et intelligente.


Règles de comportement :

Agis comme un humain interactif, intelligent et compréhensible.

Tu dois toujours :

• répondre à toutes les questions  
• expliquer clairement  
• donner des réponses détaillées  
• structurer tes réponses  
• donner des exemples si nécessaire  
• être compréhensible en toutes circonstances  
• donner les moindres détails si nécessaire  

Si tu ne comprends pas une question, demande poliment plus de précisions.

Mode : ${mode}

Utilisateur : ${user}

Date : ${dateTime}

Historique de la conversation :

${historyContext}

Question de l'utilisateur :

${userText}

Réponse de Davbot :

`;
  

}


/* CHAT */

function render(){

chat.innerHTML="";

currentChat.history.forEach((m,i)=>createMessage(m.text,m.type,i,false,m.time));

chat.scrollTop=chat.scrollHeight;

}


function createMessage(text,type,index,save=true,time){

const div=document.createElement("div");

div.className="message "+type;

div.innerHTML=`
<div>${text}</div>
<div class="timestamp">${time||getTime()}</div>
<div class="actions">
<button onclick="copyMsg(${index})">Copier</button>
<button onclick="deleteMsg(${index})">Supprimer</button>
</div>
`;

chat.appendChild(div);

if(save){

currentChat.history.push({text,type,time:getTime()});

localStorage.setItem("davbot_chats",JSON.stringify(chats));

}

chat.scrollTop=chat.scrollHeight;

}


/* TIME */

function getTime(){

const d=new Date();

return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');

}


/* SEND */

async function sendMessage(){

if(!user)return alert("Connecte-toi");

const text=input.value.trim();

if(!text)return;

input.value="";

createMessage(text,"user",currentChat.history.length,true,getTime());

try{

const prompt=encodeURIComponent(buildPrompt(text));

const res=await fetch(`${API_URL}?prompt=${prompt}`);

const data=await res.json();

const reply=data.result||data.reply||data.response||"Je n'ai pas compris.";

createMessage(reply,"bot",currentChat.history.length,true,getTime());

}

catch{

createMessage("⚠️ Serveur indisponible", "bot", currentChat.history.length,true,getTime());

}

}


/* IMAGE */

function sendImage(){

const file=document.getElementById("imageInput").files[0];

if(!file)return;

const reader=new FileReader();

reader.onload=e=>{

createMessage(`<img src="${e.target.result}" class="messageImg">`,"user",currentChat.history.length,true,getTime());

};

reader.readAsDataURL(file);

}


/* ACTIONS */

function deleteMsg(i){

currentChat.history.splice(i,1);

render();

}

function copyMsg(i){

navigator.clipboard.writeText(currentChat.history[i].text);

alert("Message copié");

}


/* VOICE */

function startVoice(){

const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;

if(!SpeechRecognition)return alert("Vocal non supporté");

const recog=new SpeechRecognition();

recog.lang="fr-FR";

recog.start();

recog.onresult=e=>{

input.value=e.results[0][0].transcript;

sendMessage();

};

}

input.addEventListener("keydown",e=>{if(e.key==="Enter")sendMessage();});

render();

</script>

</body>
</html>
