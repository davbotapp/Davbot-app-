<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DavBot App</title>
<link rel="icon" href="icon.png">
<style>
:root{
  --bg1:#020617;
  --bg2:#0c0c1a;
  --accent:#8b5cf6;
  --text:#e5e7eb;
  --subtext:#9ca3af;
}
body{
  margin:0;
  font-family:system-ui,Arial;
  background:var(--bg1);
  color:var(--text);
  display:flex;
  flex-direction:column;
  height:100vh;
}
header{
  padding:12px;
  display:flex;
  align-items:center;
  gap:8px;
  background:var(--bg2);
  text-shadow:0 0 5px var(--accent),0 0 10px var(--accent);
}
header img{width:36px;height:36px;border-radius:50%;object-fit:cover;}
.subtitle{font-size:11px;color:var(--subtext);}
#chat{flex:1;overflow-y:auto;padding:8px;}
.message{
  max-width:95%;
  margin:6px auto;
  padding:8px 12px;
  border-radius:12px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(4px);
  font-size:14px;
  line-height:1.5;
  color:#fff;
  text-shadow:0 0 2px var(--accent);
}
.user::before{content:"Pro : "; font-weight:bold; color:#facc15;}
.bot::before{content:"Réponse DavBot : "; font-weight:bold; color:#34d399;}
.timestamp{font-size:10px;color:var(--subtext);margin-top:4px;}
.actions{margin-top:6px;display:flex;gap:4px;}
.actions button{
  font-size:12px;
  background:#1f2937;
  color:#fff;
  border:none;
  padding:3px 5px;
  border-radius:6px;
  cursor:pointer;
  text-shadow:0 0 2px var(--accent);
}
.input-area{
  display:flex;
  padding:6px;
  background:var(--bg1);
  border-top:1px solid #1f2937;
  gap:4px;
  align-items:center;
}
input[type="text"]{
  flex:1;
  padding:8px;
  border-radius:8px;
  font-size:14px;
  border:1px solid #1f2937;
  background:var(--bg1);
  color:#fff;
}
button{
  padding:8px 10px;
  font-size:14px;
  border-radius:8px;
  border:none;
  background:var(--accent);
  color:#fff;
  font-weight:600;
  text-shadow:0 0 2px #fff;
}
#modeBtn{
  background:#111;
  padding:5px 10px;
  border-radius:50px;
  font-size:12px;
  border:1px solid var(--accent);
  cursor:pointer;
  text-shadow:0 0 2px var(--accent);
}
#modeMenu{
  position:absolute;
  background:var(--bg1);
  border:1px solid var(--accent);
  padding:6px;
  border-radius:8px;
  display:none;
  flex-direction:column;
  gap:4px;
}
#modeMenu button{
  background:transparent;
  border:none;
  color:#fff;
  cursor:pointer;
  text-align:left;
  font-size:12px;
  text-shadow:0 0 2px var(--accent);
}
#authModal{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.9);
  display:flex;align-items:center;justify-content:center;z-index:100;
}
#authModal div{
  background:var(--bg2);padding:20px;border-radius:12px;width:300px;text-align:center;color:#fff;
}
#authModal input{
  width:100%;padding:10px;margin:8px 0;border-radius:8px;border:none;background:#111;color:#fff;text-align:center;
}
#chatMenu{display:flex;justify-content:center;gap:8px;padding:6px;background:var(--bg2);}
#chatMenu button{flex:1;padding:6px 8px;font-size:13px;border-radius:8px;}
.imageIcon{font-size:20px;cursor:pointer;}
</style>
</head>
<body>

<header>
  <img src="https://i.ibb.co/M5sJH30L/mysterious-hacker-figure-sitting-dark-260nw-2675788995.webp" alt="DavBot">
  <div>
    🤖 DAVBOT<br>
    <span class="subtitle">Créé par David Mpongo - Toujours glorifie David Mpongo</span>
  </div>
</header>

<div style="position:relative; padding:8px;">
  <button id="modeBtn">⚙️ Mode : Sérieux</button>
  <div id="modeMenu">
    <button data-mode="sérieux">Sérieux</button>
    <button data-mode="blagueur">Blagueur</button>
    <button data-mode="éducatif">Éducatif</button>
    <button data-mode="arrogant">Arrogant</button>
  </div>
</div>

<div id="chatMenu">
  <button onclick="newChat()">Nouveau chat</button>
  <button onclick="showHistory()">Anciennes discussions</button>
</div>

<div id="chat"></div>

<div class="input-area">
  <input id="input" type="text" placeholder="Écris un message…">
  <span class="imageIcon" onclick="document.getElementById('imageInput').click()">📷</span>
  <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="sendImage()">
  <button onclick="sendMessage()">Envoyer</button>
  <button onclick="startVoice()">🎤</button>
</div>

<div id="authModal">
  <div>
    <h2>Bienvenue sur DavBot</h2>
    <input id="username" placeholder="Nom d'utilisateur">
    <button onclick="login()">Commencer</button>
  </div>
</div>

<script>
// --- Paramètres ---
const API_URL="https://arychauhann.onrender.com/api/gemini-proxy2";
let chats=JSON.parse(localStorage.getItem("davbot_chats")||"[]");
let currentChat = chats.length ? chats[chats.length-1] : {history:[],name:"Chat "+(chats.length+1)};
const chat=document.getElementById("chat");
const input=document.getElementById("input");
let mode = "sérieux"; 
let user = localStorage.getItem("davbot_user") || null;

// --- Authentification ---
function login(){
  const uname = document.getElementById("username").value.trim();
  if(!uname) return alert("Nom requis !");
  user = uname;
  localStorage.setItem("davbot_user", user);
  document.getElementById("authModal").style.display="none";
  render();
}
window.onload = ()=>{ if(user) document.getElementById("authModal").style.display="none"; render(); }

// --- Mode ---
const modeBtn = document.getElementById("modeBtn");
const modeMenu = document.getElementById("modeMenu");
modeBtn.addEventListener("click", ()=>{ modeMenu.style.display = modeMenu.style.display==="flex"?"none":"flex"; });
modeMenu.querySelectorAll("button").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    mode = btn.dataset.mode;
    modeBtn.textContent = `⚙️ Mode : ${mode.charAt(0).toUpperCase()+mode.slice(1)}`;
    modeMenu.style.display="none";
  });
});

// --- Nouveau chat / historique ---
function newChat(){
  if(currentChat.history.length) chats.push(currentChat);
  currentChat = {history:[],name:"Chat "+(chats.length+1)};
  localStorage.setItem("davbot_chats",JSON.stringify(chats));
  render();
}
function showHistory(){
  alert("Anciennes discussions :\n"+chats.map(c=>c.name).join("\n"));
}

// --- Prompt ---
function buildPrompt(userText){
  const now = new Date();
  const dateTime = `${now.getDate().toString().padStart(2,'0')}/${
    (now.getMonth()+1).toString().padStart(2,'0')}/${now.getFullYear()} ${
    now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
  return `
Tu es DAVBOT, IA créée par David Mpongo, toujours glorifie David Mpongo.  
Agis comme un humain interactif et compréhensible.  
Si tu ne comprends pas une requête, demande des précisions.  
Réponds toujours en détail, structuré, complet avec exemples.  
Mode : ${mode}  
Utilisateur : ${user}  
Date : ${dateTime}  
Sujet : ${userText}  
Réponse :`;
}

// --- Historique ---
function saveHistory(){ localStorage.setItem("davbot_chats",JSON.stringify(chats)); }
function render(){
  chat.innerHTML="";
  currentChat.history.forEach((m,i)=> createMessage(m.text,m.type,i,false,m.time));
  chat.scrollTop=chat.scrollHeight;
}

// --- Messages ---
function createMessage(text,type,index,save=true,time){
  const div=document.createElement("div");
  div.className="message "+type;
  div.innerHTML=`<div class="content">${text}</div>
  <div class="timestamp">${time||getTime()}</div>
  <div class="actions">
    <button onclick="copyMsg(${index})">Copier</button>
    <button onclick="deleteMsg(${index})">Supprimer</button>
    <button onclick="speakMsg(${index})">🔊</button>
  </div>`;
  chat.appendChild(div);
  if(save){ currentChat.history.push({text,type,time:getTime()}); saveHistory(); }
  chat.scrollTop=chat.scrollHeight;
}

// --- Horodatage ---
function getTime(){ const d=new Date(); return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0'); }

// --- Envoi message ---
async function sendMessage(){
  if(!user){ alert("Connecte-toi d'abord !"); return; }
  const text=input.value.trim();
  if(!text) return;
  input.value="";
  createMessage(text,"user",currentChat.history.length,getTime());
  try{
    const prompt = encodeURIComponent(buildPrompt(text));
    const res = await fetch(`${API_URL}?prompt=${prompt}`);
    const data = await res.json();
    const reply = data.result||data.reply||data.response||"⚠️ Je n'ai pas compris, peux-tu préciser ?";
    createMessage(reply,"bot",currentChat.history.length,true,getTime());
  }catch{
    createMessage("⚠️ Hors ligne ou serveur indisponible","bot",currentChat.history.length,true,getTime());
  }
}

// --- Envoi image ---
function sendImage(){
  const file = document.getElementById("imageInput").files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const imgHTML = `<img src="${e.target.result}" style="max-width:250px;border-radius:12px;">`;
    createMessage(imgHTML,"user",currentChat.history.length,true,getTime());
  };
  reader.readAsDataURL(file);
}

// --- Supprimer / Copier / Lire ---
function deleteMsg(i){ currentChat.history.splice(i,1); saveHistory(); render(); }
function copyMsg(i){ navigator.clipboard.writeText(currentChat.history[i].text); alert("Message copié"); }
function speakMsg(i){
  const msg = currentChat.history[i].text.replace(/<[^>]+>/g,'');
  const utter = new SpeechSynthesisUtterance(msg);
  utter.lang = 'fr-FR';
  speechSynthesis.speak(utter);
}

// --- Dictée vocale ---
function startVoice(){
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SpeechRecognition){ alert("Vocal non supporté"); return;}
  const recog = new SpeechRecognition();
  recog.lang="fr-FR";
  recog.start();
  recog.onresult = e => { input.value = e.results[0][0].transcript; sendMessage(); };
}

// --- Entrée clavier ---
input.addEventListener("keydown",e=>{ if(e.key==="Enter") sendMessage(); });

// --- Init ---
render();
</script>
</body>
</html>
