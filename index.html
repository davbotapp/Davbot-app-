<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DAVBOT AI</title>


<style>

*{
box-sizing:border-box;
font-family:Arial,sans-serif;
}


body{

margin:0;
background:#050816;
color:white;
height:100vh;
display:flex;

}



.menu{

width:250px;
background:#111827;
padding:20px;
display:none;

}


.menu h2{

color:#00d9ff;

}


.menu button{

width:100%;
border-radius:10px;
margin-bottom:10px;

}





.chat{

width:100%;
max-width:650px;
height:100vh;
display:flex;
flex-direction:column;

}





.header{

background:#111827;
padding:15px;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
font-size:22px;
font-weight:bold;
color:#00d9ff;

}



.logo{

font-size:30px;

}





#messages{

flex:1;
overflow-y:auto;
padding:15px;

}





.msg{

padding:12px;
margin:12px 0;
border-radius:15px;
max-width:85%;

animation:show .3s;

}


@keyframes show{

from{
opacity:0;
transform:translateY(10px);
}

to{
opacity:1;
}

}




.user{

background:#00d9ff;
color:black;
margin-left:auto;

}




.ai{

background:#1f2937;

}




.content{

white-space:pre-wrap;

}




.actions{

display:flex;
gap:6px;
margin-top:8px;

}




.actions button{

width:35px;
height:35px;
background:#374151;
color:white;
border-radius:50%;

}




.actions button:hover{

background:#00d9ff;
color:black;

}




.image-preview{

width:250px;
max-width:100%;
border-radius:15px;
margin-top:10px;

}





.download{

display:inline-block;
background:#00d9ff;
color:black;
padding:8px;
border-radius:10px;
margin-top:10px;
text-decoration:none;

}





.input{

display:flex;
gap:8px;
padding:15px;
background:#111827;

}




input{

flex:1;
padding:14px;
border-radius:25px;
border:none;
outline:none;
background:#1f2937;
color:white;

}





button{

border:none;
width:45px;
height:45px;
background:#00d9ff;
cursor:pointer;
font-size:18px;

}




.loading{

display:flex;
gap:5px;

}



.dot{

width:8px;
height:8px;
background:#00d9ff;
border-radius:50%;
animation:load 1s infinite;

}



@keyframes load{

50%{
opacity:.2;
}

}



</style>


</head>



<body>





<div class="chat">



<div class="header">

<span class="logo">
🤖
</span>

DAVBOT AI

</div>





<div id="messages">


<div class="msg ai">


<div class="content">

Bonjour 👋

Je suis <b>DAVBOT AI</b>.

Assistant intelligent créé pour la plateforme DAVBOT.

Créateur :
<b>Ir David Mpongo 🇨🇩</b>

Comment puis-je vous aider ?

</div>



<div class="actions">

<button onclick="speakMessage(this)">
🔊
</button>


<button onclick="copyMessage(this)">
📋
</button>


<button onclick="deleteMessage(this)">
🗑️
</button>


</div>



</div>


</div>







<div class="input">



<input 
type="file"
id="imageInput"
accept="image/*"
hidden
>




<button id="imageBtn">
📷
</button>





<input 
id="input"
type="text"
placeholder="Message à DAVBOT AI..."
>





<button id="audioBtn">

🎤

</button>





<button id="send">

➤

</button>



</div>




</div>





<script type="module" src="app.js"></script>


</body>


</html>
